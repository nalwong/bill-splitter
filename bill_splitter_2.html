<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<title>Bill Splitter</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
:root{
  --bg:#fff;--bg2:#f5f5f7;--bg3:#ebebed;
  --text:#1c1c1e;--text2:#636366;--text3:#aeaeb2;
  --border:#e5e5ea;--blue:#007aff;--green:#34c759;
  --red:#ff3b30;--card:#fff;
  --radius:12px;--radius-sm:8px;
}
@media(prefers-color-scheme:dark){
  :root{
    --bg:#000;--bg2:#1c1c1e;--bg3:#2c2c2e;
    --text:#fff;--text2:#ebebf5cc;--text3:#ebebf566;
    --border:#38383a;--card:#1c1c1e;
  }
}
body{font-family:-apple-system,BlinkMacSystemFont,'Helvetica Neue',sans-serif;background:var(--bg2);color:var(--text);min-height:100vh;padding-bottom:env(safe-area-inset-bottom)}
.app{max-width:430px;margin:0 auto;min-height:100vh;background:var(--bg2);display:flex;flex-direction:column}

/* Header */
.header{background:var(--bg);border-bottom:0.5px solid var(--border);padding:12px 16px 0;position:sticky;top:0;z-index:100}
.header-top{display:flex;align-items:center;gap:8px;padding-bottom:12px}
.header-title{font-size:17px;font-weight:600;color:var(--text)}
.header-sub{font-size:13px;color:var(--text2);margin-left:auto}
.tabs{display:flex;gap:0;margin:0 -16px}
.tab{flex:1;padding:10px 4px;font-size:13px;font-weight:500;border:none;background:none;color:var(--text3);cursor:pointer;border-bottom:2px solid transparent;transition:all .2s}
.tab.on{color:var(--blue);border-bottom-color:var(--blue)}

/* Content */
.content{flex:1;padding:16px;padding-bottom:100px;overflow-y:auto}
.section{margin-bottom:24px}
.sec-label{font-size:13px;font-weight:600;color:var(--text2);text-transform:uppercase;letter-spacing:.04em;margin-bottom:8px;padding:0 4px}

/* Cards */
.card{background:var(--card);border-radius:var(--radius);overflow:hidden;border:0.5px solid var(--border)}
.row{display:flex;align-items:center;padding:13px 16px;border-bottom:0.5px solid var(--border);gap:12px}
.row:last-child{border-bottom:none}
.row-label{font-size:15px;color:var(--text2);min-width:80px}
.row-input{flex:1;font-size:15px;border:none;background:transparent;color:var(--text);outline:none;text-align:right;font-family:inherit}
.row-input::placeholder{color:var(--text3)}
.row-unit{font-size:15px;color:var(--text3);margin-left:4px}

/* Avatar */
.av{width:36px;height:36px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:14px;font-weight:600;flex-shrink:0}

/* Person row */
.person-row{display:flex;align-items:center;padding:10px 16px;border-bottom:0.5px solid var(--border);gap:10px}
.person-row:last-child{border-bottom:none}
.person-input{flex:1;font-size:15px;font-weight:500;border:none;background:transparent;color:var(--text);outline:none;font-family:inherit}
.payer-tag{font-size:11px;font-weight:600;padding:2px 8px;border-radius:99px;background:#e5f7ea;color:#1a7a34;white-space:nowrap}
@media(prefers-color-scheme:dark){.payer-tag{background:#1a3d22;color:#4cd964}}

/* Chip */
.chips{display:flex;flex-wrap:wrap;gap:6px;padding:8px 16px 12px}
.chip{font-size:13px;padding:5px 12px;border-radius:99px;border:1px solid var(--border);background:var(--bg2);color:var(--text2);cursor:pointer;transition:all .15s;font-family:inherit}
.chip.on{background:#e8f0fe;border-color:#007aff;color:#007aff;font-weight:500}
@media(prefers-color-scheme:dark){.chip.on{background:#1a2e4a;border-color:#007aff;color:#409cff}}

/* Food item */
.food-header{display:flex;align-items:center;gap:8px;padding:12px 16px 4px}
.food-name-input{flex:1;font-size:15px;font-weight:500;border:none;background:transparent;color:var(--text);outline:none;font-family:inherit}
.food-price-input{width:72px;font-size:15px;font-weight:500;border:none;background:transparent;color:var(--text);outline:none;text-align:right;font-family:inherit}
.del-btn{background:none;border:none;color:var(--text3);cursor:pointer;font-size:22px;line-height:1;padding:0 4px;font-family:inherit}
.del-btn:active{color:var(--red)}

/* Add button */
.add-row{display:flex;align-items:center;padding:13px 16px;cursor:pointer;gap:10px}
.add-row:active{background:var(--bg3)}
.add-icon{width:28px;height:28px;border-radius:50%;background:#e8f0fe;color:#007aff;display:flex;align-items:center;justify-content:center;font-size:18px;font-weight:400;flex-shrink:0}
@media(prefers-color-scheme:dark){.add-icon{background:#1a2e4a;color:#409cff}}
.add-label{font-size:15px;color:var(--blue)}

/* Paste bill area */
.paste-card{background:var(--card);border-radius:var(--radius);border:0.5px solid var(--border);overflow:hidden}
.paste-hint{font-size:13px;color:var(--text2);padding:12px 16px 4px;line-height:1.5}
.paste-ta{width:100%;min-height:100px;padding:8px 16px 12px;font-size:14px;border:none;background:transparent;color:var(--text);outline:none;resize:vertical;font-family:-apple-system,BlinkMacSystemFont,sans-serif;line-height:1.6}
.paste-ta::placeholder{color:var(--text3)}
.parse-btn{width:calc(100% - 32px);margin:0 16px 12px;padding:11px;background:var(--green);color:#fff;border:none;border-radius:var(--radius-sm);font-size:15px;font-weight:600;cursor:pointer;font-family:inherit}
.parse-btn:active{opacity:.85}

/* Payer amount row */
.payer-row{display:flex;align-items:center;padding:10px 16px;border-bottom:0.5px solid var(--border);gap:10px}
.payer-row:last-child{border-bottom:none}
.payer-select{flex:1;font-size:15px;border:none;background:transparent;color:var(--text);outline:none;cursor:pointer;font-family:inherit;appearance:none;-webkit-appearance:none}
.payer-amt{width:90px;font-size:15px;border:none;background:transparent;color:var(--text);outline:none;text-align:right;font-family:inherit}

/* FAB */
.fab-wrap{position:fixed;bottom:0;left:0;right:0;padding:12px 16px calc(12px + env(safe-area-inset-bottom));background:linear-gradient(transparent,var(--bg2) 40%);max-width:430px;margin:0 auto}
.fab{width:100%;padding:15px;border:none;border-radius:14px;font-size:16px;font-weight:600;cursor:pointer;font-family:inherit}
.fab-blue{background:var(--blue);color:#fff}
.fab-green{background:var(--green);color:#fff}
.fab:active{opacity:.85}

/* Result */
.metric-row{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:20px}
.metric{background:var(--card);border-radius:var(--radius-sm);padding:12px 14px;border:0.5px solid var(--border)}
.metric-label{font-size:12px;color:var(--text2);margin-bottom:4px}
.metric-val{font-size:22px;font-weight:600;color:var(--text)}

.person-result{display:flex;align-items:center;padding:12px 16px;border-bottom:0.5px solid var(--border);gap:10px}
.person-result:last-child{border-bottom:none}
.result-main{flex:1}
.result-name{font-size:15px;font-weight:500;color:var(--text)}
.result-detail{font-size:12px;color:var(--text2);margin-top:2px}
.result-diff{font-size:14px;font-weight:600}
.pos{color:var(--green)}.neg{color:var(--red)}

.debt-card{background:var(--card);border-radius:var(--radius);padding:14px 16px;border:0.5px solid var(--border);display:flex;align-items:center;gap:8px;margin-bottom:8px}
.from-pill{font-size:13px;font-weight:600;padding:4px 10px;border-radius:99px;background:#ffe5e4;color:#c0392b;white-space:nowrap}
.to-pill{font-size:13px;font-weight:600;padding:4px 10px;border-radius:99px;background:#e5f7ea;color:#1a7a34;white-space:nowrap}
@media(prefers-color-scheme:dark){
  .from-pill{background:#3d1a1a;color:#ff6b6b}
  .to-pill{background:#1a3d22;color:#4cd964}
}
.arrow{font-size:16px;color:var(--text3)}
.debt-amt{margin-left:auto;font-size:16px;font-weight:700;color:var(--text)}

.empty-state{text-align:center;padding:32px 16px;color:var(--text2);font-size:15px}
.empty-icon{font-size:40px;margin-bottom:8px}
</style>
</head>
<body>
<div class="app">
  <div class="header">
    <div class="header-top">
      <div style="font-size:22px">🧾</div>
      <div class="header-title">Bill Splitter</div>
      <div class="header-sub" id="total-badge"></div>
    </div>
    <div class="tabs">
      <button class="tab on" onclick="go(0)">👥 คน</button>
      <button class="tab" onclick="go(1)">🍽 อาหาร</button>
      <button class="tab" onclick="go(2)">💸 ผลลัพธ์</button>
    </div>
  </div>
  <div class="content" id="content"></div>
  <div class="fab-wrap" id="fab-wrap"></div>
</div>

<script>
const AVCOLORS=[
  ['#e8f0fe','#1a56db'],['#e5f7ea','#1a7a34'],['#fff3cd','#856404'],
  ['#f8d7da','#721c24'],['#e8d5f7','#6f42c1'],['#d1f0f7','#0c6278'],
];

let tab=0;
let people=[{name:'นาน่า'},{name:'อิน'},{name:'มิ้ว'}];
let payers=[{idx:0,amount:650}];
let items=[
  {name:'ข้าวผัดกุ้ง',price:120,who:[0,1]},
  {name:'ต้มยำกุ้ง',price:180,who:[2]},
  {name:'ส้มตำ',price:80,who:[0,1,2]},
  {name:'น้ำมะนาว x3',price:120,who:[0,1,2]},
];
let vat=7,svc=10;

function av(i,size=36){
  const[bg,tc]=AVCOLORS[i%AVCOLORS.length];
  const name=people[i]?people[i].name:'?';
  const letter=name.trim().slice(0,1)||'?';
  return `<div class="av" style="width:${size}px;height:${size}px;background:${bg};color:${tc}">${letter}</div>`;
}

function go(t){
  tab=t;
  document.querySelectorAll('.tab').forEach((b,i)=>b.classList.toggle('on',i===t));
  render();
}

function render(){
  updateBadge();
  const el=document.getElementById('content');
  const fw=document.getElementById('fab-wrap');
  if(tab===0){el.innerHTML=renderPeople();fw.innerHTML=`<button class="fab fab-blue" onclick="go(1)">ถัดไป: รายการอาหาร →</button>`;}
  if(tab===1){el.innerHTML=renderItems();fw.innerHTML=`<button class="fab fab-green" onclick="go(2)">คำนวณ →</button>`;}
  if(tab===2){el.innerHTML=renderResult();fw.innerHTML=`<button class="fab fab-green" onclick="copyResult()">📋 copy ส่ง LINE</button>`;}
}

function updateBadge(){
  const sub=items.reduce((s,it)=>s+it.price,0);
  const total=sub*(1+svc/100)*(1+vat/100);
  document.getElementById('total-badge').textContent=total>0?`฿${total.toFixed(0)}`:'';
}

function renderPeople(){
  const plist=people.map((p,i)=>`
    <div class="person-row">
      ${av(i)}
      <input class="person-input" value="${p.name}" oninput="people[${i}].name=this.value;render()" placeholder="ชื่อ">
      ${payers.find(x=>x.idx===i)?'<span class="payer-tag">จ่ายบิล</span>':''}
      <button class="del-btn" onclick="people.splice(${i},1);payers=payers.filter(x=>x.idx!=${i});render()">×</button>
    </div>`).join('');

  const payerList=payers.map((py,i)=>`
    <div class="payer-row">
      ${av(py.idx,28)}
      <select class="payer-select" onchange="payers[${i}].idx=+this.value;render()">
        ${people.map((p,pi)=>`<option value="${pi}" ${py.idx===pi?'selected':''}>${p.name}</option>`).join('')}
      </select>
      <input class="payer-amt" type="number" inputmode="decimal" value="${py.amount}" oninput="payers[${i}].amount=+this.value" placeholder="0">
      <span style="font-size:15px;color:var(--text3)">฿</span>
      <button class="del-btn" onclick="payers.splice(${i},1);render()">×</button>
    </div>`).join('');

  return `
  <div class="section">
    <div class="sec-label">รายชื่อคน</div>
    <div class="card">
      ${plist}
      <div class="add-row" onclick="people.push({name:''});render()">
        <div class="add-icon">+</div>
        <span class="add-label">เพิ่มคน</span>
      </div>
    </div>
  </div>
  <div class="section">
    <div class="sec-label">ใครจ่ายบิลไปก่อน?</div>
    <div class="card">
      ${payerList}
      <div class="add-row" onclick="payers.push({idx:0,amount:0});render()">
        <div class="add-icon">+</div>
        <span class="add-label">เพิ่มคนจ่าย</span>
      </div>
    </div>
  </div>
  <div class="section">
    <div class="sec-label">VAT / Service Charge</div>
    <div class="card">
      <div class="row">
        <span class="row-label">VAT</span>
        <input class="row-input" type="number" inputmode="decimal" value="${vat}" oninput="vat=+this.value">
        <span class="row-unit">%</span>
      </div>
      <div class="row">
        <span class="row-label">Service</span>
        <input class="row-input" type="number" inputmode="decimal" value="${svc}" oninput="svc=+this.value">
        <span class="row-unit">%</span>
      </div>
    </div>
  </div>`;
}

function renderItems(){
  const ilist=items.map((it,i)=>`
    <div style="border-bottom:0.5px solid var(--border)">
      <div class="food-header">
        <input class="food-name-input" value="${it.name}" oninput="items[${i}].name=this.value" placeholder="ชื่ออาหาร">
        <input class="food-price-input" type="number" inputmode="decimal" value="${it.price}" oninput="items[${i}].price=+this.value" placeholder="0">
        <span style="font-size:14px;color:var(--text3)">฿</span>
        <button class="del-btn" onclick="items.splice(${i},1);render()">×</button>
      </div>
      <div class="chips">
        ${people.map((p,pi)=>`<span class="chip ${it.who.includes(pi)?'on':''}" onclick="toggleWho(${i},${pi})">${p.name}</span>`).join('')}
        <span class="chip ${it.who.length===people.length&&people.length>0?'on':''}" onclick="toggleAll(${i})" style="font-style:italic">ทุกคน</span>
      </div>
    </div>`).join('');

  return `
  <div class="section">
    <div class="sec-label">วางข้อความจากบิล</div>
    <div class="paste-card">
      <div class="paste-hint">📸 ให้ Claude อ่านบิลใน chat แล้ว copy ข้อความมาวางที่นี่เลย</div>
      <textarea class="paste-ta" id="paste-ta" placeholder="ข้าวผัดกุ้ง 120&#10;ต้มยำกุ้ง 180&#10;น้ำมะนาว 40"></textarea>
      <button class="parse-btn" onclick="parseBill()">✨ แปลงเป็นรายการ</button>
    </div>
  </div>
  <div class="section">
    <div class="sec-label">รายการอาหาร</div>
    <div class="card">
      ${ilist}
      <div class="add-row" onclick="items.push({name:'',price:0,who:[]});render()">
        <div class="add-icon">+</div>
        <span class="add-label">เพิ่มรายการ</span>
      </div>
    </div>
  </div>`;
}

function toggleWho(i,pi){
  const idx=items[i].who.indexOf(pi);
  if(idx>=0)items[i].who.splice(idx,1);else items[i].who.push(pi);
  render();
}
function toggleAll(i){
  items[i].who=items[i].who.length===people.length?[]:people.map((_,pi)=>pi);
  render();
}
function parseBill(){
  const ta=document.getElementById('paste-ta');
  if(!ta)return;
  const text=ta.value.trim();
  if(!text)return;
  const lines=text.split('\n');
  let added=0;
  lines.forEach(line=>{
    const m=line.match(/^(.+?)\s+([\d,]+(?:\.\d+)?)\s*฿?\s*$/);
    if(m){
      const price=parseFloat(m[2].replace(',',''));
      if(!isNaN(price)&&price>0){
        items.push({name:m[1].trim(),price,who:[...people.map((_,i)=>i)]});
        added++;
      }
    }
  });
  if(added>0){ta.value='';render();}
  else alert('ไม่พบรูปแบบที่อ่านได้ ลองใช้รูปแบบ: ชื่ออาหาร ราคา');
}

function calcOwed(){
  const sub=items.reduce((s,it)=>s+it.price,0);
  const total=sub*(1+svc/100)*(1+vat/100);
  const extra=total-sub;
  const owed={};
  people.forEach((_,i)=>owed[i]=0);
  items.forEach(it=>{
    if(!it.who.length)return;
    const share=it.price/it.who.length;
    it.who.forEach(pi=>owed[pi]=(owed[pi]||0)+share);
  });
  people.forEach((_,i)=>{
    const prop=sub>0?owed[i]/sub:1/people.length;
    owed[i]=+(owed[i]+extra*prop).toFixed(2);
  });
  const paid={};
  people.forEach((_,i)=>paid[i]=0);
  payers.forEach(py=>paid[py.idx]=(paid[py.idx]||0)+py.amount);
  const bal={};
  people.forEach((_,i)=>bal[i]=+(paid[i]-owed[i]).toFixed(2));
  return{owed,paid,bal,sub,total};
}

function settle(bal){
  const b={...bal},txns=[];
  for(let k=0;k<30;k++){
    const debtors=Object.entries(b).filter(([,v])=>v<-0.01).sort((a,c)=>a[1]-c[1]);
    const creds=Object.entries(b).filter(([,v])=>v>0.01).sort((a,c)=>c[1]-a[1]);
    if(!debtors.length||!creds.length)break;
    const[df,dv]=debtors[0];const[cf,cv]=creds[0];
    const amt=Math.min(-dv,cv);
    txns.push({from:+df,to:+cf,amt:+amt.toFixed(2)});
    b[df]+=amt;b[cf]-=amt;
  }
  return txns;
}

function renderResult(){
  const{owed,paid,bal,sub,total}=calcOwed();
  const txns=settle({...bal});

  const svcAmt=sub*(svc/100);
  const vatAmt=sub*(1+svc/100)*(vat/100);

  const personRows=people.map((p,i)=>`
    <div class="person-result">
      ${av(i)}
      <div class="result-main">
        <div class="result-name">${p.name}</div>
        <div class="result-detail">ส่วนแบ่ง ฿${owed[i].toFixed(2)} · จ่ายแล้ว ฿${paid[i].toFixed(2)}</div>
      </div>
      <div class="result-diff ${bal[i]>=0?'pos':'neg'}">${bal[i]>=0?'+':''}฿${Math.abs(bal[i]).toFixed(2)}</div>
    </div>`).join('');

  const debtCards=txns.length===0
    ?`<div class="empty-state"><div class="empty-icon">🎉</div>ทุกคนเท่ากันหมดเลย!</div>`
    :txns.map(t=>`
      <div class="debt-card">
        <span class="from-pill">${people[t.from].name}</span>
        <span class="arrow">→</span>
        <span class="to-pill">${people[t.to].name}</span>
        <span class="debt-amt">฿${t.amt.toFixed(2)}</span>
      </div>`).join('');

  return `
  <div class="metric-row">
    <div class="metric"><div class="metric-label">ยอดอาหาร</div><div class="metric-val">฿${sub.toFixed(0)}</div></div>
    <div class="metric"><div class="metric-label">รวมทั้งหมด</div><div class="metric-val">฿${total.toFixed(0)}</div></div>
  </div>
  <div class="section">
    <div class="card" style="padding:12px 16px">
      <div style="display:flex;justify-content:space-between;font-size:14px;padding:4px 0;color:var(--text2)"><span>Service charge (${svc}%)</span><span>+฿${svcAmt.toFixed(2)}</span></div>
      <div style="display:flex;justify-content:space-between;font-size:14px;padding:4px 0;color:var(--text2)"><span>VAT (${vat}%)</span><span>+฿${vatAmt.toFixed(2)}</span></div>
      <div style="height:0.5px;background:var(--border);margin:8px 0"></div>
      <div style="display:flex;justify-content:space-between;font-size:16px;font-weight:600;padding:4px 0"><span>รวม</span><span>฿${total.toFixed(2)}</span></div>
    </div>
  </div>
  <div class="section">
    <div class="sec-label">สรุปแต่ละคน</div>
    <div class="card">${personRows}</div>
  </div>
  <div class="section">
    <div class="sec-label">ใครโอนให้ใคร</div>
    ${debtCards}
  </div>`;
}

function copyResult(){
  const{owed,bal,total}=calcOwed();
  const txns=settle({...bal});
  let txt=`🧾 หารบิล\nยอดรวม ฿${total.toFixed(2)}\n\n`;
  if(txns.length===0)txt+='ทุกคนเท่ากันหมดเลย! 🎉\n';
  else txns.forEach(t=>txt+=`• ${people[t.from].name} โอนให้ ${people[t.to].name} ฿${t.amt.toFixed(2)}\n`);
  txt+='\n(คำนวณด้วย Bill Splitter)';
  if(navigator.clipboard){
    navigator.clipboard.writeText(txt).then(()=>alert('Copy แล้ว! 🎉 ไปวาง LINE ได้เลย'));
  }else{
    const ta=document.createElement('textarea');
    ta.value=txt;document.body.appendChild(ta);
    ta.select();document.execCommand('copy');
    document.body.removeChild(ta);
    alert('Copy แล้ว! 🎉 ไปวาง LINE ได้เลย');
  }
}

render();
</script>
</body>
</html>
